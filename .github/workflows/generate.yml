name: Generate Article Every 6 Hours

on:
  schedule:
    - cron: '0 */6 * * *'   # هر ۶ ساعت یکبار اجرا می‌شود
  workflow_dispatch:        # به شما اجازه می‌دهد دکمه اجرا داشته باشید

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests
      - name: Run article generator
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python generate_article.py
      - name: Commit and push changes
        run: |
          git config user.name "AI Journalist"
          git config user.email "bot@techplus.eu.org"
          git add articles.json
          git diff --staged --quiet || (git commit -m "خبر جدید" && git push)
